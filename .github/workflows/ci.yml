name: CI

on:
  push:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend Tests
  # Uses SQLite (no Postgres service needed).
  # Django settings.py already falls back to
  # SQLite when DATABASE_URL is not set.
  # ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: "django-insecure-ci-secret-key-for-testing-only"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      # No DATABASE_URL → Django uses SQLite fallback (see settings.py lines 86-95)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --run-syncdb

      - name: Run backend tests
        run: |
          cd backend
          python manage.py test users --verbosity=2

  # ─────────────────────────────────────────────
  # JOB 2: Frontend Build
  # Validates the React/Vite app builds cleanly.
  # Uses --legacy-peer-deps to match Dockerfile.
  # ─────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: "https://stock-backend.onrender.com"

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # Runs only after both tests pass.
  # Requires secrets: DOCKER_USERNAME, DOCKER_TOKEN
  # ─────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stock-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stock-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Render
  # Runs only after Docker images are pushed.
  # Requires secrets: RENDER_BACKEND_DEPLOY_HOOK,
  #                   RENDER_FRONTEND_DEPLOY_HOOK
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-push]

    steps:
      - name: Deploy backend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Deploy frontend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
