services:
  - type: web
    name: stock-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"

  - type: web
    name: stock-frontend
    env: docker
    plan: free
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: stock-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: stock-db
    databaseName: stockdb
    user: stockuser
    plan: free
